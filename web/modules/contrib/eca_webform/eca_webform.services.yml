services:

  eca_webform.subscriber:
    class: Drupal\eca_webform\EventSubscriber\EcaWebform
    parent: eca.execution.subscriber_parent
    tags:
      - { name: event_subscriber }

  eca_webform.hook_handler:
    class: Drupal\eca_webform\HookHandler
    arguments:
      - '@eca.trigger_event'
      - '@current_user'
